[general]
# Security configuration

# Prevent MIME type sniffing
strict_type_checking = true

# Disable inline scripts (use CSP header instead in production)
allow_inline_scripts = false

# Enable security features
enable_hsts = true
hsts_max_age = 31536000

# Enable security monitoring
enable_security_logging = true

[authentication]
# No authentication for this static site
auth_required = false

[rate_limiting]
# Prevent abuse
enabled = true
requests_per_minute = 60
burst_limit = 100

[content_security]
# Prevent XSS
xss_protection = true
csp_strict = true

[cors]
# Only allow requests from same origin
cors_enabled = false
