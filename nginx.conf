# Nginx configuration for secure documentation site deployment
# Save as: /etc/nginx/sites-available/docs.conf
# Then: ln -s /etc/nginx/sites-available/docs.conf /etc/nginx/sites-enabled/

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name docs.example.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.example.com;

    # SSL/TLS Configuration
    ssl_certificate /etc/letsencrypt/live/docs.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.example.com/privkey.pem;
    
    # Modern TLS configuration (A+ rating)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/docs.example.com/chain.pem;

    # Security Headers
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HSTS (HTTP Strict Transport Security)
    # Tells browsers to always use HTTPS for this domain
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy - prevents XSS attacks
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://pagefind.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;
    limit_req zone=general burst=50 nodelay;

    # Logging
    access_log /var/log/nginx/docs_access.log combined buffer=32k;
    error_log /var/log/nginx/docs_error.log warn;

    # Root directory
    root /var/www/docs;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_level 6;

    # Static assets - cache for long time
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - cache for shorter time, always revalidate
    location ~* \.html?$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Search endpoint - rate limit
    location /pagefind/ {
        limit_req zone=search burst=20 nodelay;
        try_files $uri $uri/ =404;
    }

    # API proxy (if needed)
    # location /api/ {
    #     limit_req zone=general burst=100 nodelay;
    #     proxy_pass https://api.example.com;
    #     proxy_ssl_verify off;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Main site - serve static files or fallback to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
    }

    # Performance optimizations
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;
    
    # Connection settings
    keepalive_requests 100;
    reset_timedout_connection on;
}

# Additional configurations
# 1. Monitor disk space and logs
# 2. Set up log rotation in /etc/logrotate.d/nginx
# 3. Monitor with: tail -f /var/log/nginx/docs_access.log
# 4. Test SSL: ssl-labs.com/ssltest/analyze.html?d=docs.example.com
# 5. Monitor performance: https://www.gtmetrix.com
